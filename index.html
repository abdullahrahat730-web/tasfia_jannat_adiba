<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff0000,#e64560,#800064,#4c0163);
color:#fff;
text-align:center;
overflow-x:hidden;
}

#countdown{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:8rem;
font-weight:bold;
background:#000;
z-index:9999;
}

.glow{
text-shadow:0 0 20px rgb(245,226,61),0 0 40px rgb(230,69,96);
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:5;
}

section{
min-height:100vh;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
}

h1{font-size:3rem;}
h2{font-size:2rem;}
p{max-width:750px;font-size:1.2rem;line-height:1.7;}

.btn{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff2d55;
color:#fff;
cursor:pointer;
}

.btn:hover{
background:#8f0000;
transform:scale(1.05);
}

/* LETTER */
.letter{
display:none;
background:white;
color:#333;
max-width:700px;
padding:40px;
border-radius:12px;
margin-top:30px;
}

.letter p{
white-space:pre-line;
text-align:left;
font-size:1.15rem;
line-height:1.8;
}

/* ENVELOPE */
.envelope{
position:relative;
width:320px;
height:200px;
margin-top:30px;
}

.envelope-back{
position:absolute;
width:100%;
height:100%;
background:#c0392b;
border-radius:10px;
}

.envelope-front{
position:absolute;
width:0;
height:0;
border-left:160px solid transparent;
border-right:160px solid transparent;
border-top:100px solid #e74c3c;
bottom:0;
}

.heart-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:red;
color:white;
border:none;
padding:18px 28px;
border-radius:50px;
cursor:pointer;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:20px;
opacity:.4;
transition:.4s;
}

.gallery img:hover{
opacity:1;
transform:scale(1.08);
}

/* CAKE */
.cake{
font-size:80px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="countdown">3</div>
<canvas id="fireworks"></canvas>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>

<section id="s1">
<h1>🎂 Happy Birthday 🎂</h1>
<h2>❤️ Tasfia Jannat Adiba ❤️</h2>
<button class="btn" onclick="playMusic();go('s2')">Start</button>
</section>

<section id="s2">

<h1>💌 Message</h1>

<div class="envelope" id="envelope">
<div class="envelope-back"></div>
<div class="envelope-front"></div>
<button class="heart-btn" onclick="openLetter()">OPEN</button>
</div>

<div class="letter" id="letter">
<p id="typedLetter"></p>
<button class="btn" onclick="go('s3')">Next</button>
</div>

</section>

<section id="s3">

<h1>📸 Memories</h1>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
</div>

<button class="btn" onclick="go('s4')">Next</button>

</section>

<section id="s4">

<h1>🎂 Final</h1>
<div class="cake">🎂</div>

<p>Allah tomake bhalo rakhuk 🤍</p>

</section>

<script>

/* COUNTDOWN */
let c=3
const cd=document.getElementById("countdown")
const s1=document.getElementById("s1")

setInterval(()=>{
c--
if(c<=0){
cd.style.display="none"
s1.style.display="flex"
}
else cd.innerText=c
},1000)

/* MUSIC */
function playMusic(){
document.getElementById("bgMusic").play()
}

/* NAV */
function go(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="flex"
}

/* LETTER */
const letterText=`প্রিয় মহারাণী আদিবা,
শুভ জন্মদিন 🌸

আল্লাহর কাছে দোয়া করি, এই নতুন বছরে তিনি আপনার জীবনকে সুখ, শান্তি আর অফুরন্ত আনন্দে ভরে দিন।

আপনাকে অসংখ্য ধন্যবাদ—আমার জীবনে এসে সেটাকে একসময় এতটা সুন্দর করে তোলার জন্য। হয়তো আপনাকে কখনোই পুরোপুরি ভুলতে পারবো না, কারণ আপনার সাথে কাটানো প্রতিটি দিন, প্রতিটি মুহূর্ত আমার জীবনের সবচেয়ে সুন্দর স্মৃতিগুলোর একটি হয়ে থাকবে। আজও সেই দিনগুলো খুব মনে পড়ে—যখন আমরা একসাথে কথা বলতাম, অনুভূতিগুলো ভাগ করে নিতাম। কিন্তু সত্যি বলতে, সবচেয়ে বেশি আপনাকেই মিস করি। আপনি ছাড়া অনেক সময়ই সবকিছু ফাঁকা মনে হয়।

জানি না, আমরা আবার কোনোদিন আগের মতো হতে পারবো কি না। তবুও আল্লাহর কাছে দোয়া করি—যদি তাঁর ইচ্ছা হয়, হয়তো আবার কোনোদিন…

যাই হোক, আপনি যেভাবেই থাকুন, যেখানেই থাকুন, যার সাথেই থাকুন—সবসময় ভালো থাকবেন। হাসিখুশি থাকবেন। কারণ আপনার হাসি আপনাকে আরও সুন্দর করে তোলে।

ইতি,
আব্দুল্লাহ`

let i=0

function typeLetter(){
const el=document.getElementById("typedLetter")
if(i<letterText.length){
el.innerHTML+=letterText.charAt(i)
i++
setTimeout(typeLetter,30)
}
}

function openLetter(){
document.getElementById("envelope").style.display="none"
document.getElementById("letter").style.display="block"
typeLetter()
}

/* SLIDESHOW */
let slide=0
const imgs=document.querySelectorAll(".gallery img")

setInterval(()=>{
imgs.forEach(img=>img.style.opacity=".4")
imgs[slide].style.opacity="1"
slide=(slide+1)%imgs.length
},2000)

</script>

</body>
  </html>
